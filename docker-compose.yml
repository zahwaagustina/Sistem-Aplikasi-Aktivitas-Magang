version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aktivitas_magang_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aktivitas_magang
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aktivitas_magang_backend
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/aktivitas_magang?schema=public
      - JWT_SECRET=super_secret_jwt_key_here
      - PORT=5000
      - SMTP_HOST=smtp.example.com
      - SMTP_PORT=587
      - SMTP_USER=your_email@example.com
      - SMTP_PASS=your_password
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    command: sh -c "npx prisma db push && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_URL is embedded at build time for the client browser
        - VITE_API_URL=http://localhost:5000/api
    container_name: aktivitas_magang_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
